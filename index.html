<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>悠悠的數位生活基地</title>
    <style>
        /* 採用 Nord 極簡色彩美學：純白底色、冷灰字體、深黑強調 */
        :root {
            --bg-color: #ffffff;
            --text-main: #2e3440;
            --text-muted: #4c566a;
            --text-light: #b8bbc1;
            --border-color: #eceff4;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            max-width: 680px;
            margin: 0 auto;
            padding: 80px 24px;
            line-height: 1.8;
            letter-spacing: 0.5px;
        }

        /* 標頭：極度克制，不帶一絲贅肉 */
        header {
            margin-bottom: 60px;
        }
        h1 {
            font-size: 1.6rem;
            font-weight: 500;
            margin: 0 0 8px 0;
            color: #000;
        }
        .bio {
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        /* 分類區塊 */
        section {
            margin-bottom: 50px;
        }
        h2 {
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-light);
            margin-bottom: 20px;
            font-weight: 600;
        }

        /* 條列式生活活動：取消框線卡片，改用留白與點綴線，比教授的條列更具現代感 */
        .log-item {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 12px 0;
            border-bottom: 1px dashed var(--border-color);
        }
        .log-content {
            flex: 1;
            padding-right: 20px;
        }
        .log-title {
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--text-main);
            text-decoration: none;
        }
        .log-desc {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin: 4px 0 0 0;
        }
        .log-date {
            font-size: 0.85rem;
            color: var(--text-light);
            white-space: nowrap;
            font-family: monospace;
        }

        /* 底部頁尾 */
        footer {
            margin-top: 100px;
            font-size: 0.8rem;
            color: var(--text-light);
            text-align: center;
        }
    </style>
</head>
<body>

    <header>
        <h1>Yunci's Journal</h1>
        <p class="bio">看似尋常的日常，都是值得留在網路上細細品味的活動紀錄。</p>
    </header>

    <!-- 生活活動區塊 -->
    <section>
        <h2>Log / 生活活動</h2>
        
        <div class="log-item">
            <div class="log-date">2026.07</div>
        </div>

        <div class="log-item">
            <div class="log-content">
                <div class="log-title">日常隨筆─關於那些耳機裡重複播放的旋律</div>
                <p class="log-desc">記錄一些放鬆時聽的音樂，以及生活裡偶然閃過的零碎想法。</p>
            </div>
            <div class="log-date">2026.07.01</div>
        </div>
    </section>

    <!-- 學習筆記區塊 -->
    <section>
        <h2>Notes / 知識庫</h2>

        <div class="log-item">
            <div class="log-content">
                <div class="log-title">Python基礎與邏輯優化筆記</div>
                <p class="log-desc">學習如何優化程式邏輯，為未來的專案或學校報告打下乾淨的程式底子。</p>
            </div>
            <div class="log-date">Running</div>
        </div>
    </section>

    <footer>
        <p>© 2026 Yunci. Built with GitHub Pages.</p>
    </footer>

</body>
</html>
