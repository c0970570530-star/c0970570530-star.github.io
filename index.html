<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>悠悠的數位生活基地</title>
    <style>
        /* Nord 極簡色彩美學 */
        :root {
            --bg-color: #ffffff;
            --text-main: #2d3748;
            --text-muted: #4a5568;
            --text-light: #718096;
            --border-color: #edf2f7;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            max-width: 680px;
            margin: 0 auto;
            padding: 80px 24px;
            line-height: 1.8;
            letter-spacing: 0.5px;
        }

        /* 標頭區 */
        header { margin-bottom: 30px; }
        h1 { font-size: 1.6rem; font-weight: 600; margin: 0 0 12px 0; color: #1a202c; }
        .bio { font-size: 0.9rem; color: var(--text-muted); margin: 0; }

        /* 簡約導覽列 */
        nav { margin-bottom: 50px; padding: 15px 0; border-bottom: 1px solid var(--border-color); }
        nav a { color: var(--text-light); text-decoration: none; font-size: 0.85rem; margin-right: 25px; letter-spacing: 1px; transition: all 0.2s ease; cursor: pointer; padding-bottom: 14px; border-bottom: 2px solid transparent; }
        nav a:hover { color: #000000; }
        /* 核心樣式：被選中的標籤會有黑字與底線 */
        nav a.active { color: #000000; font-weight: 600; border-bottom: 2px solid #000000; }

        /* 區塊設定：預設不顯示 */
        section { margin-bottom: 50px; display: none; }
        /* 當區塊有 active 類別時才顯示 */
        section.active { display: block; }
        
        /* 條列式活動清單 */
        .log-item { display: flex; justify-content: space-between; align-items: flex-start; padding: 16px 0; border-bottom: 1px dashed var(--border-color); }
        .log-content { flex: 1; padding-right: 30px; }
        .log-title { font-size: 0.95rem; font-weight: 500; color: var(--text-main); margin: 0; }
        .log-desc { font-size: 0.85rem; color: var(--text-muted); margin: 6px 0 0 0; }
        .log-date { font-size: 0.85rem; color: var(--text-light); white-space: nowrap; font-family: monospace; padding-top: 2px; }

        /* 頁尾 */
        footer { margin-top: 100px; font-size: 0.8rem; color: var(--text-light); text-align: center; }
    </style>
</head>
<body>

    <header>
        <h1>悠悠的數位生活基地</h1>
        <p class="bio">看似尋常的日常，都是值得留在網路上細細品味的活動紀錄。</p>
    </header>

    <nav>
        <a id="tab-log" class="active" onclick="switchTab('log')">LOG / 生活活動</a>
        <a id="tab-notes" onclick="switchTab('notes')">NOTES / 知識庫</a>
    </nav>

    <section id="log" class="active">
        <div class="log-item">
            <div class="log-content">
                <h3 class="log-title">日常隨筆 ─ 關於那些耳機裡重複播放的旋律</h3>
                <p class="log-desc">記錄一些放鬆時聽的音樂，以及生活裡偶然閃過的零碎想法。</p>
            </div>
            <div class="log-date">2026.07</div>
        </div>
        <div class="log-item">
        </div>
    </section>

    <section id="notes">
        <div class="log-item">
            <div class="log-content">
                <h3 class="log-title">（知識庫內容準備中）</h3>
                <p class="log-desc">點選導覽標籤成功了！這裡未來可以放 Python 筆記。</p>
            </div>
            <div class="log-date">2026.07.08</div>
        </div>
    </section>

    <footer><p>© 2026 Yunci. Built with GitHub Pages.</p></footer>

    <script>
        function switchTab(tabId) {
            // 1. 先把所有區塊都藏起來，取消所有標籤的 active
            document.getElementById('log').classList.remove('active');
            document.getElementById('notes').classList.remove('active');
            document.getElementById('tab-log').classList.remove('active');
            document.getElementById('tab-notes').classList.remove('active');
            
            // 2. 顯示被點選的區塊，並幫它的導覽標籤加上 active（底線與黑字）
            document.getElementById(tabId).classList.add('active');
            document.getElementById('tab-' + tabId).classList.add('active');
        }
    </script>
</body>
</html>
